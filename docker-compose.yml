services:
  server:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./:/app
      - bun-cache:/root/.bun
      - root-node-modules:/app/node_modules
      - server-node-modules:/app/apps/server/node_modules
    environment:
      - PORT=3000
    command: sh -lc "bun install && bun run --cwd apps/server dev"
    ports:
      - "3000:3000"

  web:
    image: oven/bun:1
    working_dir: /app
    depends_on:
      - server
    volumes:
      - ./:/app
      - bun-cache:/root/.bun
      - root-node-modules:/app/node_modules
      - web-node-modules:/app/apps/web/node_modules
    command: sh -lc "bun install && bun run --cwd apps/web dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

volumes:
  bun-cache:
  root-node-modules:
  server-node-modules:
  web-node-modules:
